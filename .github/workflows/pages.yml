# Build the Jekyll site and deploy it to GitHub Pages.
# Repo setup (once): Settings → Pages → Build and deployment → Source: "GitHub Actions".
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]      # change if your default branch differs
  workflow_dispatch:         # allows manual runs from the Actions tab

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true   # runs bundle install + caches gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # base_path is injected automatically, so project pages
      # (org.github.io/<repo>) get the correct baseurl with no manual edits.
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
